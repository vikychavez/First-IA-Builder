<div class="list-header">
  <h2>Personal de {{ cliente()?.nombre }}</h2>
  <a mat-flat-button color="primary" routerLink="nuevo">
    <mat-icon>add</mat-icon>
    Nuevo Personal
  </a>
</div>

<a routerLink="/clientes">&larr; Volver a Clientes</a>

<table mat-table [dataSource]="personal()" class="mat-elevation-z1">
  <ng-container matColumnDef="dni">
    <th mat-header-cell *matHeaderCellDef>DNI</th>
    <td mat-cell *matCellDef="let p">{{ p.dni }}</td>
  </ng-container>

  <ng-container matColumnDef="apellidoNombre">
    <th mat-header-cell *matHeaderCellDef>Apellido y Nombre</th>
    <td mat-cell *matCellDef="let p">{{ p.apellido }}, {{ p.nombre }}</td>
  </ng-container>

  <ng-container matColumnDef="categoria">
    <th mat-header-cell *matHeaderCellDef>Categoría</th>
    <td mat-cell *matCellDef="let p">{{ p.categoriaNombre }} ({{ p.tipoRetiro }})</td>
  </ng-container>

  <ng-container matColumnDef="provincia">
    <th mat-header-cell *matHeaderCellDef>Provincia</th>
    <td mat-cell *matCellDef="let p">{{ p.provincia }}</td>
  </ng-container>

  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let p">
      <a mat-icon-button [routerLink]="[p.id, 'editar']" aria-label="Editar">
        <mat-icon>edit</mat-icon>
      </a>
      <button mat-icon-button (click)="darDeBaja(p)" aria-label="Dar de baja">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnas"></tr>
  <tr mat-row *matRowDef="let row; columns: columnas"></tr>
</table>
