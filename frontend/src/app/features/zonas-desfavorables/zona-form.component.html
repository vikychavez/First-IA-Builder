<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>{{ editando ? 'Editar' : 'Nueva' }} Zona Desfavorable</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="guardar()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Provincia</mat-label>
        <mat-select formControlName="provincia">
          @for (provincia of provincias; track provincia) {
            <mat-option [value]="provincia">{{ provincia }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <div class="form-actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Guardar</button>
        <a mat-button routerLink="/zonas-desfavorables">Cancelar</a>
      </div>
    </form>
  </mat-card-content>
</mat-card>
