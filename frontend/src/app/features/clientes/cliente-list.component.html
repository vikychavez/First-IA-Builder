<div class="list-header">
  <h2>Clientes</h2>
  <a mat-flat-button color="primary" routerLink="nuevo">
    <mat-icon>add</mat-icon>
    Nuevo Cliente
  </a>
</div>

<table mat-table [dataSource]="clientes()" class="mat-elevation-z1">
  <ng-container matColumnDef="nombre">
    <th mat-header-cell *matHeaderCellDef>Nombre</th>
    <td mat-cell *matCellDef="let cliente">{{ cliente.nombre }}</td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef="let cliente">{{ cliente.email }}</td>
  </ng-container>

  <ng-container matColumnDef="telefono">
    <th mat-header-cell *matHeaderCellDef>Teléfono</th>
    <td mat-cell *matCellDef="let cliente">{{ cliente.telefono }}</td>
  </ng-container>

  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let cliente">
      <a mat-icon-button [routerLink]="[cliente.id, 'personal']" aria-label="Ver personal">
        <mat-icon>people</mat-icon>
      </a>
      <a mat-icon-button [routerLink]="[cliente.id, 'editar']" aria-label="Editar">
        <mat-icon>edit</mat-icon>
      </a>
      <button mat-icon-button (click)="darDeBaja(cliente)" aria-label="Dar de baja">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnas"></tr>
  <tr mat-row *matRowDef="let row; columns: columnas"></tr>
</table>
