<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>Parámetros Regulatorios</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="guardar()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Porcentaje de Antigüedad (por año, ej. 0.01 = 1%)</mat-label>
        <input matInput type="number" step="0.0001" formControlName="porcentajeAntiguedad" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Porcentaje de Zona Desfavorable (ej. 0.31 = 31%)</mat-label>
        <input matInput type="number" step="0.0001" formControlName="porcentajeZonaDesfavorable" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Multiplicador Horas Extras (ej. 1.50)</mat-label>
        <input matInput type="number" step="0.01" formControlName="multiplicadorHorasExtras" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Multiplicador Feriados (ej. 2.00)</mat-label>
        <input matInput type="number" step="0.01" formControlName="multiplicadorFeriados" />
      </mat-form-field>

      @if (guardado()) {
        <p class="success">Parámetros guardados correctamente.</p>
      }
      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <div class="form-actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Guardar</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
