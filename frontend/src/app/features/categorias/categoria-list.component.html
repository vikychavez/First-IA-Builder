<div class="list-header">
  <h2>Categorías</h2>
  <a mat-flat-button color="primary" routerLink="nuevo">
    <mat-icon>add</mat-icon>
    Nueva Categoría
  </a>
</div>

<table mat-table [dataSource]="categorias()" class="mat-elevation-z1">
  <ng-container matColumnDef="nombre">
    <th mat-header-cell *matHeaderCellDef>Nombre</th>
    <td mat-cell *matCellDef="let categoria">{{ categoria.nombre }}</td>
  </ng-container>

  <ng-container matColumnDef="valorHoraConRetiro">
    <th mat-header-cell *matHeaderCellDef>Valor Hora Con Retiro</th>
    <td mat-cell *matCellDef="let categoria">{{ categoria.valorHoraConRetiro | number: '1.2-2' }}</td>
  </ng-container>

  <ng-container matColumnDef="valorHoraSinRetiro">
    <th mat-header-cell *matHeaderCellDef>Valor Hora Sin Retiro</th>
    <td mat-cell *matCellDef="let categoria">{{ categoria.valorHoraSinRetiro | number: '1.2-2' }}</td>
  </ng-container>

  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let categoria">
      <a mat-icon-button [routerLink]="[categoria.id, 'editar']" aria-label="Editar">
        <mat-icon>edit</mat-icon>
      </a>
      <button mat-icon-button (click)="darDeBaja(categoria)" aria-label="Dar de baja">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnas"></tr>
  <tr mat-row *matRowDef="let row; columns: columnas"></tr>
</table>
