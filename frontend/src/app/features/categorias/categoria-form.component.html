<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>{{ editando ? 'Editar' : 'Nueva' }} Categoría</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="guardar()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="nombre" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Valor Hora Con Retiro</mat-label>
        <input matInput type="number" step="0.01" formControlName="valorHoraConRetiro" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Valor Hora Sin Retiro</mat-label>
        <input matInput type="number" step="0.01" formControlName="valorHoraSinRetiro" />
      </mat-form-field>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <div class="form-actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Guardar</button>
        <a mat-button routerLink="/categorias">Cancelar</a>
      </div>
    </form>
  </mat-card-content>
</mat-card>
